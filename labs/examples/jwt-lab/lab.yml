name: JWT Token Hacking Lab
version: "1.0"
description: "Learn to exploit common JWT vulnerabilities — none algorithm, weak secrets, algorithm confusion"
difficulty: beginner
author: hacklab
tags:
  - jwt
  - authentication
  - web
  - token-manipulation

image: pdteam/jwt-lab:latest
port: 8000

wait_for: "http://localhost:8000"
wait_secs: 30

objectives:
  - name: "Bypass authentication using the 'none' algorithm"
    category: "jwt"
    hints:
      - "Change the JWT algorithm to 'none' in the header"
      - "Remove the signature entirely"
    flag: "flag{jwt_none_algorithm}"

  - name: "Crack a weak HMAC secret"
    category: "jwt"
    hints:
      - "The secret is a common dictionary word"
      - "Use jwt-cracker or hashcat mode 16500"
      - "Try: john --wordlist=rockyou.txt token"
    flag: "flag{weak_secret_cracked}"

  - name: "Exploit algorithm confusion (RS256 to HS256)"
    category: "jwt"
    hints:
      - "The server uses RS256 (asymmetric) but also accepts HS256"
      - "Use the public key as the HMAC secret"
      - "Sign a new token with HS256 using the public key"
    flag: "flag{algorithm_confusion}"

  - name: "Forge an admin token"
    role: "admin"
    category: "jwt"
    hints:
      - "Decode an existing token and change the role claim"
      - "Re-sign it with the cracked secret"
    flag: "flag{forged_admin_token}"
