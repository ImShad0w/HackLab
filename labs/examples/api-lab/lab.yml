name: REST API Security Lab
version: "1.0"
description: "Test your API hacking skills — broken object level authorization, mass assignment, rate limiting bypass, and more"
difficulty: intermediate
author: hacklab
tags:
  - api
  - rest
  - authorization
  - rate-limiting

image: crapi/crapi:latest
port: 8888

wait_for: "http://localhost:8888"
wait_secs: 60

objectives:
  - name: "Exploit Broken Object Level Authorization (BOLA)"
    category: "authorization"
    hints:
      - "Change the user ID in API requests to access other users' data"
      - "GET /api/users/1/profile -> try /api/users/2/profile"

  - name: "Perform mass assignment to escalate privileges"
    category: "mass-assignment"
    hints:
      - "Add 'role': 'admin' to your registration/profile request"
      - "The API doesn't filter unexpected parameters"

  - name: "Bypass rate limiting on the login endpoint"
    category: "rate-limiting"
    hints:
      - "Use X-Forwarded-For header to spoof different IPs"
      - "Or rotate through a proxy list"

  - name: "Exploit insecure direct object reference in file downloads"
    category: "idor"
    hints:
      - "Check the file download endpoint for path traversal"
      - "Try ../../etc/passwd in the filename parameter"

  - name: "Discover a hidden admin endpoint"
    category: "recon"
    hints:
      - "Check /api/admin, /api/v1/admin, /api/swagger"
      - "Use API fuzzing tools like Arjun or ParamSpider"
